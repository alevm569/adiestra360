# Build + serve de la PWA en Railway.
# Root Directory del servicio frontend = adiestra360_frontend

[phases.setup]
nixPkgs = ["nodejs_20", "caddy"]

[phases.install]
# npm install (no `ci`) porque el lockfile se regenera al alinear Capacitor
# y agregar vite-plugin-pwa. Tras el primer `npm install` local + commit,
# puede cambiarse a `npm ci` para builds reproducibles.
cmds = ["npm install"]

[phases.build]
# Vite lee .env.production (VITE_API_URL) durante el build.
cmds = ["npm run build"]

[start]
cmd = "caddy run --config Caddyfile --adapter caddyfile"
